block:
  description: Deploy a docker-compose service to Coolify
  runner: terraform
  layer: deploy
  provider: coolify
  required_secrets:
    - COOLIFY_TOKEN

provides:
  deploy.service_uuid:
    type: string
  deploy.app_url:
    type: string

requires:
  coolify.project_uuid:
    description: Coolify project to deploy into
  registry.image_path:
    description: Full image path to pull
    optional: true
