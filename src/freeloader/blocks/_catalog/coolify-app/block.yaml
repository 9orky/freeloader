block:
  name: coolify-app
  description: Deploy a Docker Image application to Coolify
  runner: terraform
  layer: deploy
  provider: coolify
  required_secrets:
    - COOLIFY_TOKEN

provides:
  deploy.app_uuid:
    type: string
  deploy.app_url:
    type: string

requires:
  coolify.project_uuid:
    description: Coolify project to deploy into
  registry.image_path:
    description: Full image path to pull
    optional: true

config:
  name:
    type: string
    required: true
  server_uuid:
    type: string
    required: true
    description: UUID of your server in Coolify
  coolify_endpoint:
    type: string
    required: true
    description: Base URL of Coolify (e.g. https://coolify.example.com)
  destination_uuid:
    type: string
    required: true
    description: UUID of the Docker network/destination on the server
  environment_name:
    type: string
    default: production
  domain:
    type: string
    default: ""
  ports_exposes:
    type: string
    default: "80"
  docker_registry_image_tag:
    type: string
    default: latest
