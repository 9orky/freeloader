block:
  name: github-repo
  runner: terraform
  layer: source
  provider: github
  required_secrets:
    - GITHUB_TOKEN

provides:
  source.repo_name:
    type: string
  source.clone_url:
    type: string

requires:
  registry.host:
    optional: true
  registry.token:
    optional: true
    usage: github_secret
  registry.user:
    optional: true
    usage: github_secret
  registry.image_path:
    optional: true
    usage: github_secret
  deploy.webhook_url:
    optional: true
    usage: github_secret

config:
  name:
    type: string
    required: true
  org:
    type: string
  visibility:
    type: string
    default: private
    choices:
      - public
      - private
  description:
    type: string
    default: ""
  protect_main:
    type: boolean
    default: false
