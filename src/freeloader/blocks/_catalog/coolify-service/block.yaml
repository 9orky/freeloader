block:
  name: coolify-service
  description: Deploy a docker-compose service to Coolify
  runner: terraform
  layer: deploy
  provider: coolify
  required_secrets:
    - COOLIFY_TOKEN

provides:
  deploy.service_uuid:
    type: string
  deploy.app_url:
    type: string

requires:
  coolify.project_uuid:
    description: Coolify project to deploy into
  registry.image_path:
    description: Full image path to pull
    optional: true

config:
  name:
    type: string
    required: true
  server_uuid:
    type: string
    required: true
    description: UUID of your server in Coolify
  coolify_endpoint:
    type: string
    required: true
    description: Base URL of Coolify API (e.g. https://coolify.example.com/api/v1)
  destination_uuid:
    type: string
    required: true
    description: UUID of the Docker network/destination on the server
  environment_name:
    type: string
    default: production
  compose:
    type: string
    default: ""
    description: Raw docker-compose content (auto-generated from image if empty)
  domain:
    type: string
    default: ""
