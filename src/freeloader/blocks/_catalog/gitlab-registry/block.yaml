block:
  name: gitlab-registry
  runner: terraform
  layer: registry
  provider: gitlab
  required_secrets:
    - GITLAB_TOKEN

provides:
  registry.host:
    type: string
  registry.token:
    type: string
  registry.user:
    type: string
  registry.image_path:
    type: string
  registry.project_id:
    type: string

requires: {}

config:
  name:
    type: string
    required: true
  visibility:
    type: string
    default: private
    choices:
      - public
      - private
      - internal
  description:
    type: string
    default: ""
  token_scopes:
    type: list
    default:
      - read_registry
      - write_registry
