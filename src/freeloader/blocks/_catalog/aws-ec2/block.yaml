block:
  name: aws-ec2
  runner: terraform
  layer: infra
  provider: aws
  required_secrets:
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY

provides:
  server.ip_address:
    type: string
  server.instance_id:
    type: string
  server.ssh_user:
    type: string
  server.public_dns:
    type: string

requires: {}

config:
  instance_type:
    type: string
    default: t3.micro
    choices:
      - t2.micro
      - t3.micro
      - t3.small
  region:
    type: string
    default: eu-central-1
  ami:
    type: string
    default: ""
  key_name:
    type: string
  ssh_public_key:
    type: string
